<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map - Rakshika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        #map { 
            height: 75vh; 
            width: 100%; 
            background: #111; 
        }
        
        /* Pulse Animation for User Location */
        .user-pulse {
            width: 12px;
            height: 12px;
            background: #3b82f6;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        /* Styling the floating buttons menu */
        .glass-menu {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="bg-black text-white p-4 overflow-hidden">
    <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-4">
            <a href="/"><i class="fas fa-arrow-left text-xl text-red-600"></i></a>
            <h1 class="text-xl font-bold tracking-wider">RAKSHIKA MAP</h1>
        </div>
        <div id="gps-status" class="text-xs text-green-500 animate-pulse">● GPS ACTIVE</div>
    </div>
    
    <div class="relative">
        <div id="map" class="rounded-3xl border border-zinc-800 shadow-2xl overflow-hidden"></div>

        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z- flex gap-4 w-max">
            
            <button onclick="findNearestSafeZone()" class="glass-menu p-4 rounded-2xl shadow-xl active:scale-90 transition-all">
                <i class="fas fa-person-running text-green-500 text-2xl"></i>
                <p class="text-[10px] mt-1 text-zinc-400">SAFE ZONE</p>
            </button>
            
            <button onclick="shareLocation()" class="glass-menu p-4 rounded-2xl shadow-xl active:scale-90 transition-all">
                <i class="fas fa-share-nodes text-blue-500 text-2xl"></i>
                <p class="text-[10px] mt-1 text-zinc-400">SHARE</p>
            </button>

            <button onclick="triggerFakeCall()" class="glass-menu p-4 rounded-2xl shadow-xl active:scale-90 transition-all border-b-2 border-red-600">
                <i class="fas fa-phone-alt text-red-500 text-2xl"></i>
                <p class="text-[10px] mt-1 text-zinc-400">FAKE CALL</p>
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
