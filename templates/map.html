<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map - Rakshika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Map height fix */
        #map { 
            height: 500px; /* Fix height deni padti hai kabhi kabhi */
            min-height: 70vh; 
            width: 100%; 
            background: #111; /* Jab tak map load na ho black dikhe */
        }
        
        /* Aapki purani animations yaha rahegi */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
        .leaflet-marker-icon.pulse { animation: pulse-red 1.5s infinite; }
    </style>
</head>
<body class="bg-black text-white p-4">
    <div class="flex items-center gap-4 mb-4">
        <a href="/"><i class="fas fa-arrow-left text-xl text-red-600"></i></a>
        <h1 class="text-xl font-bold font-['Orbitron']">Live Safety Map</h1>
    </div>
    
    <div id="map" class="rounded-2xl border border-zinc-800 shadow-2xl"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
